<!doctype html>
<html>
  <head>
    <style>
      #map {
        height: 100vh;
      }

      .map-overlay {
        font:
          bold 12px/20px "Helvetica Neue",
          Arial,
          Helvetica,
          sans-serif;
        position: absolute;
        z-index: 1000;
        width: 25%;
        top: 0;
        left: 0;
        padding: 10px;
      }

      .map-overlay .map-overlay-inner {
        background-color: #fff;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
        border-radius: 3px;
        padding: 10px;
        margin-bottom: 10px;
      }

      .map-overlay label {
        display: block;
        margin: 0 0 10px;
      }

      .map-overlay input {
        background-color: transparent;
        display: inline-block;
        width: 100%;
        position: relative;
        margin: 0;
        cursor: ew-resize;
      }
    </style>
    <script type="module" crossorigin src="/temp-allmaps-leaflet/assets/index-jmhNFPFj.js"></script>
    <link rel="stylesheet" crossorigin href="/temp-allmaps-leaflet/assets/index-vh-t_kPv.css">
  </head>
  <body>
    <div id="map"></div>
    <div class="map-overlay">
      <div class="map-overlay-inner">
        <label>Transparency: <span id="slider-value">100%</span></label>
        <input
          id="opacity-slider"
          type="range"
          min="0"
          max="1"
          step="0.01"
          value="1"
        />
      </div>
    </div>
  </body>
</html>
